# Tuned for ~8GB RAM: Ollama 3B, Whisper base, beam_size=3.
# For 16GB+ set WHISPER_MODEL=small or medium and optionally WHISPER_BEAM_SIZE=5.
services:
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s

  ollama-init:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - ollama pull "qwen2.5:1.5b"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
        required: false
      ollama:
        condition: service_healthy
        required: false
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-false}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
      # 8GB RAM: use base/small; set WHISPER_MODEL=small or medium on 16GB+
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-3}
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/list-apps').read()" ]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ADK_API_BASE: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  ollama-data:
  huggingface-cache:
