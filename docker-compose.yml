# Tuned for ~8GB RAM: Ollama 3B, Whisper base, beam_size=3.
# For 16GB+ set WHISPER_MODEL=small or medium and optionally WHISPER_BEAM_SIZE=5.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint:
      - /bin/sh
      - -c
      - ollama pull "$$OLLAMA_MODEL"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_API_BASE: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      # 8GB RAM: use base/small; set WHISPER_MODEL=small or medium on 16GB+
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-3}
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/list-apps').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ADK_API_BASE: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  ollama-data:
  huggingface-cache:
